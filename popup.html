<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px;
      padding: 10px;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 10px;
      object-fit: cover;
    }

    select,
    button {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .main-btn {
      background-color: #007bff;
      color: white;
      border: none;
      font-weight: bold;
    }

    .main-btn:hover {
      background-color: #0056b3;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-top: 12px;
      font-size: 14px;
      color: #333;
    }

    .checkbox-container input {
      margin-right: 8px;
      cursor: pointer;
      width: 16px;
      height: 16px;
    }
  </style>
</head>

<body>
  <div class="header">
    <img src="avatar.png" alt="Avatar" class="avatar">
    <h4 style="margin: 0; font-size: 14px;">DasTarrVn 💕</h4>
  </div>

  <select id="level">
    <option value="rd5">Level 6 (Totally agree - Max)</option>
    <option value="rd4">Level 5 (Agree)</option>
    <option value="rd3">Level 4 (Slightly agree)</option>
    <option value="rd2">Level 3 (Slightly disagree)</option>
    <option value="rd1">Level 2 (Disagree)</option>
    <option value="rd0">Level 1 (Totally disagree)</option>
  </select>

  <div class="checkbox-container">
    <input type="checkbox" id="autoSubmit">
    <label for="autoSubmit">Auto submit the form</label>
  </div>

  <button id="fillBtn" class="main-btn">Fill Form Now</button>

  <script src="popup.js"></script>
</body>

</html>
